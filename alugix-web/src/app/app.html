<div class="status-page">
  <div class="status-card">
    <h1 class="app-title">Alugix</h1>
    <p class="app-subtitle">Sistema de Gerenciamento de Aluguéis</p>

    <div class="status-indicator">
      @switch (status()) {
        @case ('loading') {
          <mat-spinner diameter="40" />
          <span class="status-text loading">Verificando conexão com a API...</span>
        }
        @case ('online') {
          <mat-icon class="status-icon online">check_circle</mat-icon>
          <span class="status-text online">Sistema Online</span>
        }
        @case ('offline') {
          <mat-icon class="status-icon offline">error</mat-icon>
          <span class="status-text offline">API Offline — verifique o back-end</span>
        }
      }
    </div>
  </div>
</div>

<router-outlet />
