<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">Pagamentos</h1>
      <p class="page-subtitle">Acompanhe os pagamentos dos seus contratos</p>
    </div>
  </div>

  <div class="info-card">
    <mat-icon>receipt_long</mat-icon>
    <h2>Pagamentos por Contrato</h2>
    <p>
      Os pagamentos são gerenciados dentro de cada contrato.
      Acesse um contrato para visualizar e registrar os pagamentos mensais.
    </p>
    <button mat-flat-button color="primary" (click)="irParaContratos()">
      <mat-icon>description</mat-icon>
      Ver Contratos
    </button>
  </div>
</div>
