spring:
  application:
    name: alugix-api

  datasource:
    url: jdbc:postgresql://62.72.11.28:7412/alugix_db
    username: alugix_user
    password: alugix@2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /

jwt:
  secret: alugix-secret-key-2026-spring-boot-jwt-seguro-256bits-minimo
  expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
